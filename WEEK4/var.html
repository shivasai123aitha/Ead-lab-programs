<html>
<head>
    <title>Experiment 1</title>
</head>
<body>
<script>
    var a = 10;
    let b = "JavaScript";
    const c = true;

    let obj = { name: "Alice", age: 20 };
    let arr = [1, 2, 3, 4];

    console.log("Number:", a);
    console.log("String:", b);

    console.log(x); // Accessible
    // console.log(y); // Error
</script>
