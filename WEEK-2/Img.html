<!DOCTYPE html>
<html>
<head>
  <title>Images with Captions</title>
  <style>
    .container {
      display: flex;
      gap: 20px;
    }

    figure {
      text-align: center;
    }

    img {
      width: 200px;
      height: 150px;
      border: 2px solid black;
    }
  </style>
</head>
<body>

  <h1>Image Gallery</h1>

  <div class="container">

    <figure>
      <img src="https://via.placeholder.com/200x150" alt="Image 1">
      <figcaption>Beautiful Nature</figcaption>
    </figure>

    <figure>
      <img src="https://via.placeholder.com/200x150" alt="Image 2">
      <figcaption>Mountain View</figcaption>
    </figure>

    <figure>
      <img src="https://via.placeholder.com/200x150" alt="Image 3">
      <figcaption>Sunset Scene</figcaption>
    </figure>

  </div>

</body>
</html>
