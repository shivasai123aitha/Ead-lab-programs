<!DOCTYPE html>
<html>
<head>
  <title>Welcome Message</title>
</head>
<body>

  <h1>Click the button to see a message</h1>

  <button onclick="showMessage()">Click Me</button>

  <p id="output"></p>

  <script>
    function showMessage() {
      document.getElementById("output").innerHTML = "Welcome to the Web Page!";
    }
  </script>

</body>
</html>
