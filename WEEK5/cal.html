<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #d6ecff;
            font-family: Arial, sans-serif;
        }

        .info {
            position: absolute;
            top: 15px;
            right: 20px;
            text-align: right;
            font-weight: bold;
            color: #0d3b66;
        }

        .calculator {
            background-color: #0d3b66;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        #display {
            width: 100%;
            height: 55px;
            margin-bottom: 15px;
            font-size: 22px;
            text-align: right;
            padding-right: 10px;
            border-radius: 8px;
            border: none;
            background-color: #f0f8ff;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 65px);
            gap: 12px;
        }

        button {
            height: 55px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .number {
            background-color: #5dade2;
            color: white;
        }

        .number:hover {
            background-color: #3498db;
        }

        .operator {
            background-color: #1b4f72;
            color: white;
        }

        .operator:hover {
            background-color: #154360;
        }

        .equal {
            background-color: #2ecc71;
            color: white;
        }

        .equal:hover {
            background-color: #27ae60;
        }

        .clear {
            background-color: #e74c3c;
            color: white;
            grid-column: span 4;
        }

        .clear:hover {
            background-color: #c0392b;
        }
    </style>
</head>

<body>

<div class="info">
    Aitha Shivasai <br>
    160124737165
</div>

<div class="calculator">
    <input type="text" id="display" disabled>

    <div class="buttons">
        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('/')">/</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('*')">*</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('-')">-</button>

        <button class="number" onclick="appendValue('0')">0</button>
        <button class="number" onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="clear" onclick="clearDisplay()">C</button>
    </div>
</div>

<script>
    function appendValue(value) {
        document.getElementById("display").value += value;
    }

    function clearDisplay() {
        document.getElementById("display").value = "";
    }

    function calculate() {
        try {
            let result = eval(document.getElementById("display").value);
            document.getElementById("display").value = result;
        } catch (error) {
            document.getElementById("display").value = "Error";
        }
    }
</script>

</body>
</html>
