<!DOCTYPE html>

</head>
<body>
<div style="position:absolute;top:10px;right:20px;text-align:right;">

    <p><b>Open Console</b></p>
</div>
<script>
    let myPromise=new Promise(function(resolve,reject) {
        let success=true;
        if (success){
            resolve("Task completed!");
        }else{
            reject("Task failed!");
        }
    });
    myPromise
        .then(function(result){
            console.log(result);
        })
        .catch(function(error){
            console.log(error);
        });
</script>
</body>
</html>
